# OpsV Category Validation Rules (v0.15.0)
# Document-level business rules by `category` field.
# Lookup order:
#   1. ~/.opsv/category_validate.yaml (user-level global fallback)
#   2. <projectRoot>/.opsv/category_validate.yaml (project-level, highest priority)
#
# The loader starts from an empty rule set. All rules come from config files.
# Recommended defaults for `project` and `shotdeck` categories are defined below.
# Copy this file to ~/.opsv/category_validate.yaml or .opsv/category_validate.yaml.
#
# 全局默认检查（不依赖 category）：
#   - prompt: 必填、≥10字符、无占位符
#   - brief:  建议填写（warning 级别），用于 annotate prompt 编译
# 可通过 skip_prompt_check: true / skip_brief_check: true 在类别规则中跳过。

# ---------------------------------------------------------------------------
# Default rules for built-in categories:
#   - project:  metadata file, no generation, skip prompt checks
#   - shotdeck: video batch frontmatter, still needs prompt quality
# ---------------------------------------------------------------------------

project:
  required_fields: [status]
  skip_prompt_check: true

shotdeck:
  required_fields: [status, title]
  field_schema:
    prompt:
      min_length: 10
      no_placeholder: true

