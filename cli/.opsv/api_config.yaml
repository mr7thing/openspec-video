    supports_reference_videos: true
    max_reference_videos: 3
    supports_reference_audios: true
    max_reference_audios: 3
    inputs:
      prompt:
        source: prompt
        target: content[0].text
      first_frame:
        source: first_frame
        target: content[].image_url
      last_frame:
        source: last_frame
        target: content[].image_url
      image:
        source: refs[image]
        target: content[].image_url
      video:
        source: refs[video]
        target: content[].video_url
      audio:
        source: refs[audio]
        target: content[].audio_url
    defaults:
      ratio: "16:9"
      duration: 5
      generate_audio: true
      watermark: false
    # == payload_example ==
    payload_example:
      model: "doubao-seedance-2-0-260128"
      content:
        - type: "text"
