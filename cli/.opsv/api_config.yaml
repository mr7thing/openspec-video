# OpsV 多模态资产生态系统配置文件
#
# 修改 api_url 可切换私有化部署或区域节点
# 修改 defaults / inputs / payload_example 可调整生成参数而无需重新编译代码
#
# 使用示例:
#   opsv produce --model volc.seedance2
#   opsv produce --model rh-api.seedance
#   opsv produce --model rh-workflow-v2.klein9b
#   opsv produce --model comfylocal.workflow
#   opsv run opsv-queue/videospec.circle1/
#
# 配置项说明:
#   inputs:        声明 source（从文档/refs/defaults 读取）→ target（注入到 payload 路径）
#   defaults:      运行时默认值
#   payload_example: API 请求体 JSON 骨架（定义在配置块末尾，以 # == payload_example == 分隔）

# 并发控制:
#   在 model 下添加 concurrency 可指定该 provider 的单 provider 内并发数
#   CLI: opsv run --concurrency 3 <dir> 可覆盖 api_config 中的设置
#   默认串行 (concurrency=1)，仅对支持并发的 API 建议调高

# 超时 / 轮询 / 重试配置化:
#   在 model 下可添加:
#     timeout:
#       submit: 120000      # 任务提交超时 (ms)
#       status: 30000       # 状态查询超时 (ms)
#       download: 30000     # 下载超时 (ms)
#       health: 5000        # 健康检查超时 (ms)
#     max_poll_duration: 14400000   # 最大轮询时长 (ms), 默认 4h
#     retry:
#       max_retries: 3
#       delay_cap: 30000    # 重试延迟上限 (ms)

models:
  # ==========================================
  # 火山引擎 (Volcengine Ark)
  # ==========================================

  volc.seadream5:
    provider: volcengine
    type: imagen
    model: doubao-seedream-5-0-260128
    api_url: https://ark.cn-beijing.volces.com/api/v3/images/generations
    docs_url: https://www.volcengine.com/docs/82379/1824121
    required_env:
      - ARK_API_KEY
    supports_reference_images: true
    max_reference_images: 1
    defaults:
      size: "2048x2048"
      steps: 30
      cfg_scale: 7.5
      negative_prompt: "blurry, low quality, distorted, deformed, ugly, bad anatomy, text, watermark, signature"
      output_format: "png"
      response_format: "url"
      watermark: false
      sequential_image_generation: "auto"
      max_images: 4
    quality_map:
      "1920x1080": "2560x1440"
      "2K": "2560x1440"
      "hd": "2560x1440"
      "standard": "2560x1440"
    # == payload_example ==
    payload_example:
      model: "doubao-seedream-5-0-260128"
      prompt: ""
      size: "2048x2048"
      steps: 30
      cfg_scale: 7.5
      negative_prompt: ""
      output_format: "png"
      response_format: "url"
      watermark: false
      sequential_image_generation: "auto"
      max_images: 4

