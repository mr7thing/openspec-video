# Multi-Ref Pack Category Validation Rules
# 覆盖所有 8 个技能的自定义 category

# ---------------------------------------------------------------------------
# S1: 剧本拆解
# ---------------------------------------------------------------------------
multi_ref_breakdown:
  required_fields: [status, id, sequence, scene, shot_type, camera_movement, character, action, duration_est, prompt]
  field_schema:
    prompt:
      min_length: 50
      no_placeholder: true
      refs_in_prompt_must_match_refs: true
    id:
      min_length: 5
      no_placeholder: true
    duration_est:
      min_length: 1
    shot_type:
      min_length: 2
    camera_movement:
      min_length: 4

# ---------------------------------------------------------------------------
# S2: 定档设计
# ---------------------------------------------------------------------------
multi_ref_design:
  required_fields: [status, id, type, prompt]
  field_schema:
    prompt:
      min_length: 50
      no_placeholder: true
    id:
      min_length: 2
      no_placeholder: true
    type:
      min_length: 5

# ---------------------------------------------------------------------------
# S3: Shortlist（下游确定性合同）
# ---------------------------------------------------------------------------
shortlist:
  required_fields: [status, id, title, shot_count, shots, characters, scenes, props]
  field_schema:
    id:
      min_length: 5
      no_placeholder: true
    title:
      min_length: 4
      no_placeholder: true
    shot_count:
      type: integer
      min: 1
    shots:
      type: array
      min_items: 1
      item_schema:
        id:
          min_length: 5
        duration:
          type: integer
          min: 6
          max: 15
        scene:
          min_length: 3
        characters:
          type: array
    characters:
      type: array
      item_schema:
        id:
          min_length: 2
        frequency:
          enum: [high, medium, low, single]
    scenes:
      type: array
      item_schema:
        id:
          min_length: 3
        frequency:
          enum: [high, medium, low, single]
    props:
      type: array
      item_schema:
        id:
          min_length: 2

# ---------------------------------------------------------------------------
# S4: 资产生成（ZeroCircle）
# ---------------------------------------------------------------------------
character:
  required_fields: [status, id, type, generation_type]
  field_schema:
    id:
      min_length: 3
      no_placeholder: true
    generation_type:
      min_length: 4

prop:
  required_fields: [status, id, type, generation_type]
  field_schema:
    id:
      min_length: 3
      no_placeholder: true
    generation_type:
      min_length: 4

scene:
  required_fields: [status, id, type, generation_type]
  field_schema:
    id:
      min_length: 3
      no_placeholder: true
    generation_type:
      min_length: 4

# ---------------------------------------------------------------------------
# S4.5: 资产扩展 — 多视图参照表
# ---------------------------------------------------------------------------
character_multi_view:
  required_fields: [status, id, generation_type, refs, prompt]
  field_schema:
    prompt:
      min_length: 100
      no_placeholder: true
      refs_in_prompt_must_match_refs: true
    id:
      min_length: 5
      no_placeholder: true

scene_multi_view:
  required_fields: [status, id, generation_type, refs, prompt]
  field_schema:
    prompt:
      min_length: 100
      no_placeholder: true
      refs_in_prompt_must_match_refs: true
    id:
      min_length: 5
      no_placeholder: true

# ---------------------------------------------------------------------------
# S5: 镜头参考帧 — 单帧合成参考图（FirstCircle）
# ---------------------------------------------------------------------------
shot_ref:
  required_fields: [status, id, shot_id, generation_type, prompt, refs]
  field_schema:
    prompt:
      min_length: 80
      no_placeholder: true
      refs_in_prompt_must_match_refs: true
    shot_id:
      min_length: 5
    key_moment:
      min_length: 5

# ---------------------------------------------------------------------------
# S5.5: 分镜多格草图（FirstCircle）
# ---------------------------------------------------------------------------
shot_storyboard:
  required_fields: [status, id, shot_id, prompt, refs]
  field_schema:
    prompt:
      min_length: 100      # 九宫格 prompt 较长
      no_placeholder: true
      refs_in_prompt_must_match_refs: true
    shot_id:
      min_length: 5

# ---------------------------------------------------------------------------
# S6: 视频生产（EndCircle）
# ---------------------------------------------------------------------------
shot_production:
  required_fields: [status, id, shot_id, prompt, duration, refs]
  field_schema:
    prompt:
      min_length: 50
      no_placeholder: true
      refs_in_prompt_must_match_refs: true
    shot_id:
      min_length: 5
    duration:
      min_length: 1

# ---------------------------------------------------------------------------
# S7: 声音设计
# ---------------------------------------------------------------------------
voice:
  required_fields: [status, id, prompt]
  field_schema:
    prompt:
      min_length: 20
      no_placeholder: true
    id:
      min_length: 3

bgm:
  required_fields: [status, id, prompt]
  field_schema:
    prompt:
      min_length: 20
      no_placeholder: true
    id:
      min_length: 3

sound_effect:
  required_fields: [status, id, prompt, shot_id]
  field_schema:
    prompt:
      min_length: 20
      no_placeholder: true
    id:
      min_length: 3
    shot_id:
      min_length: 5
