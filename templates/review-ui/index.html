<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpsV Review</title>
    <style>
        :root {
            --bg: #0f0f12;
            --surface: #18181c;
            --card: #222228;
            --accent: #6366f1;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --text: #f1f5f9;
            --muted: #64748b;
            --border: rgba(255,255,255,0.07);
            --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--surface);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .header h1 { font-size: 16px; font-weight: 700; }
        .header-info { font-size: 12px; color: var(--muted); }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left Sidebar */
        .sidebar {
            width: 300px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }
        .category-group { border-bottom: 1px solid var(--border); }
        .category-name {
            padding: 10px 16px;
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(0,0,0,0.2);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-name:hover { color: var(--text); }
        .category-name .count { font-size: 10px; background: var(--card); padding: 2px 6px; border-radius: 4px; }

        .doc-item {
            padding: 10px 16px 10px 28px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: background 0.15s;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .doc-item:hover { background: rgba(255,255,255,0.03); }
        .doc-item.active { background: rgba(99,102,241,0.15); border-left: 3px solid var(--accent); padding-left: 25px; }
        .doc-item .doc-id { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .doc-item .doc-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
        .status-dot.approved { background: var(--green); }
        .status-dot.syncing { background: var(--yellow); }
        .status-dot.drafting { background: var(--muted); }
        .output-count { font-size: 10px; color: var(--muted); }

        /* Content Area */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            padding: 12px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .toolbar-left { display: flex; align-items: center; gap: 10px; }
        .toolbar-right { display: flex; gap: 8px; }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-approve { background: var(--green); color: #000; }
        .btn-approve:hover:not(:disabled) { background: #16a34a; }
        .btn-draft { background: var(--yellow); color: #000; }
        .btn-draft:hover:not(:disabled) { background: #ca8a04; }
        .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
        .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

        .panes {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Doc Pane */
        .doc-pane {
            width: 40%;
            border-right: 1px solid var(--border);
            overflow-y: auto;
            background: #0d0d10;
        }
        .doc-empty {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            gap: 12px;
            font-size: 13px;
            padding: 20px;
            text-align: center;
        }
        .doc-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .doc-header h2 { font-size: 16px; margin-bottom: 4px; }
        .doc-header .doc-id-badge { font-size: 11px; background: var(--card); padding: 3px 8px; border-radius: 4px; color: var(--muted); }
        .doc-content { padding: 20px; font-size: 13px; line-height: 1.7; }
        .doc-content h1 { font-size: 18px; margin-bottom: 16px; color: var(--text); }
        .doc-content h2 { font-size: 15px; margin: 20px 0 10px; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        .doc-content h3 { font-size: 14px; margin: 16px 0 8px; color: var(--text); }
        .doc-content p { margin-bottom: 10px; color: #94a3b8; }
        .doc-content pre { background: var(--card); border-radius: 6px; padding: 12px; font-size: 12px; overflow-x: auto; margin: 10px 0; }
        .doc-content code { background: var(--card); padding: 2px 5px; border-radius: 4px; font-size: 12px; color: #a5b4fc; }
        .doc-content pre code { background: none; padding: 0; color: inherit; }
        .doc-content blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--muted); font-style: italic; margin: 10px 0; }
        .doc-content ul, .doc-content ol { margin: 8px 0 10px 20px; color: #94a3b8; }
        .doc-content li { margin-bottom: 4px; }
        .doc-content img { max-width: 100%; border-radius: 6px; margin: 10px 0; }
        .doc-content table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        .doc-content th, .doc-content td { padding: 8px; border: 1px solid var(--border); text-align: left; }
        .doc-content th { background: var(--card); }

        .collapsible-header {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 0;
        }
        .collapsible-header::before { content: '▼'; font-size: 10px; transition: transform 0.2s; }
        .collapsible-header.collapsed::before { transform: rotate(-90deg); }
        .collapsible-content { overflow: hidden; }
        .collapsible-content.collapsed { display: none; }

        /* Media Pane */
        .media-pane {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--bg);
        }
        .media-empty {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            gap: 12px;
            font-size: 13px;
        }
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }
        .media-card {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        .media-card:hover { border-color: rgba(99,102,241,0.4); transform: translateY(-2px); }
        .media-card.selected { border-color: var(--green); box-shadow: 0 0 0 1px var(--green); }
        .media-card img, .media-card video { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #000; }
        .media-info { padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; }
        .media-name { font-size: 12px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
        .media-meta { font-size: 10px; color: var(--muted); background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; }
        .selected-badge { position: absolute; top: 8px; right: 8px; background: var(--green); color: #000; width: 20px; height: 20px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
        .media-card { position: relative; }
        .media-card.selected .selected-badge { display: flex; }

        .output-group { margin-bottom: 24px; }
        .output-group-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .output-group-title span { color: var(--text); font-size: 12px; }

        /* Preview Modal */
        .preview-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            gap: 16px;
        }
        .preview-modal.active { display: flex; }
        .preview-modal img, .preview-modal video { max-width: 95vw; max-height: 85vh; object-fit: contain; }
        .preview-close { position: absolute; top: 20px; right: 20px; background: var(--card); border: 1px solid var(--border); color: var(--text); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .preview-controls { display: flex; gap: 12px; align-items: center; }
        .preview-name { font-size: 14px; color: #94a3b8; }
        .preview-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .preview-btn:hover { border-color: var(--accent); }

        /* Review Modal */
        .review-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }
        .review-modal.active { display: flex; }
        .review-box {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 28px;
            width: 440px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .review-box h2 { font-size: 17px; margin-bottom: 6px; }
        .review-box .subtitle { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
        .review-preview { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--card); border-radius: 8px; margin-bottom: 16px; }
        .review-preview img { width: 64px; height: 36px; object-fit: cover; border-radius: 4px; }
        .review-preview .name { font-size: 13px; font-weight: 600; }
        .review-preview .provider { font-size: 11px; color: var(--muted); }
        .review-fields { display: flex; flex-direction: column; gap: 12px; }
        .review-fields label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .review-fields input, .review-fields textarea {
            width: 100%; padding: 10px 12px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text); font-size: 13px;
            font-family: inherit;
        }
        .review-fields textarea { resize: vertical; min-height: 80px; }
        .review-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 2000;
            display: none;
            animation: slideIn 0.2s ease;
        }
        .toast.show { display: block; }
        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--red); }
        @keyframes slideIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Filter Bar */
        .filter-bar {
            padding: 10px 16px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .filter-bar select, .filter-bar input {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            outline: none;
        }
        .filter-bar select { min-width: 110px; cursor: pointer; }
        .filter-bar input { flex: 1; }
        .filter-bar select:focus, .filter-bar input:focus { border-color: var(--accent); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>OpsV Review</h1>
        <span class="header-info" id="serverInfo">Loading...</span>
    </div>

    <div class="main">
        <!-- Left Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">Documents</div>
            <div class="filter-bar">
                <select id="categoryFilter" onchange="applyFilters()">
                    <option value="">All Categories</option>
                </select>
                <input type="text" id="searchInput" placeholder="🔍 Search..." oninput="applyFilters()">
            </div>
            <div id="docList" style="flex:1;overflow-y:auto;">
                <div style="padding:20px;color:var(--muted);font-size:13px;">Loading...</div>
            </div>
        </div>

        <!-- Right Content -->
        <div class="content">
            <div class="toolbar">
                <div class="toolbar-left">
                    <button class="btn btn-approve" id="approveBtn" disabled onclick="openReviewModal('approved')">
                        ✓ Approve (<span id="selectedCount">0</span>)
                    </button>
                    <button class="btn btn-draft" id="draftBtn" disabled onclick="openReviewModal('drafting')">
                        ↩ Set Drafting
                    </button>
                    <span id="currentDoc" style="font-size:12px;color:var(--muted);margin-left:8px;">—</span>
                </div>
                <div class="toolbar-right">
                    <button class="btn btn-ghost" onclick="location.reload()">↻ Refresh</button>
                </div>
            </div>

            <div class="panes">
                <!-- Doc Pane -->
                <div class="doc-pane" id="docPane">
                    <div class="doc-empty">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        <span>Select a document from the left</span>
                    </div>
                </div>

                <!-- Media Pane -->
                <div class="media-pane" id="mediaPane">
                    <div class="media-empty">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                        <span>No media to review</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div class="preview-modal" id="previewModal">
        <button class="preview-close" onclick="closePreview()">✕</button>
        <div id="previewContent"></div>
        <div class="preview-controls">
            <span class="preview-name" id="previewName"></span>
            <button class="preview-btn" onclick="selectCurrentMedia()">✓ Select</button>
        </div>
    </div>

    <!-- Review Modal -->
    <div class="review-modal" id="reviewModal">
        <div class="review-box">
            <h2 id="reviewModalTitle">Review Decision</h2>
            <p class="subtitle" id="reviewModalSubtitle"></p>

            <div class="review-preview" id="reviewMediaPreview" style="display:none;">
                <img id="reviewMediaThumb" src="" alt="">
                <div>
                    <div class="name" id="reviewMediaName"></div>
                    <div class="provider" id="reviewMediaProvider"></div>
                </div>
            </div>

            <div class="review-fields">
                <div>
                    <label>Review Note</label>
                    <textarea id="reviewNote" placeholder="Add comments or feedback..."></textarea>
                </div>
            </div>

            <div class="review-actions">
                <button class="btn btn-ghost" onclick="closeReviewModal()">Cancel</button>
                <button class="btn btn-approve" id="reviewSubmitBtn" onclick="submitReview()">Confirm</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = '';

        let documents = [];
        let filteredDocuments = [];
        let selectedOutputs = new Set(); // "circle|provider|filename"
        let currentDoc = null;
        let pendingMedia = null;

        async function init() {
            try {
                const res = await fetch(`${API}/api/documents`);
                documents = await res.json();
                filteredDocuments = [...documents];
                populateCategoryFilter();
                document.getElementById('serverInfo').textContent = `${documents.length} document(s)`;
                renderDocList();
            } catch (e) {
                showToast('Failed to load documents: ' + e.message, 'error');
            }
        }

        function populateCategoryFilter() {
            const select = document.getElementById('categoryFilter');
            const categories = [...new Set(documents.map(d => d.category).filter(Boolean))].sort();
            let html = '<option value="">All Categories</option>';
            for (const cat of categories) {
                const count = documents.filter(d => d.category === cat).length;
                html += `<option value="${cat}">${cat} (${count})</option>`;
            }
            select.innerHTML = html;
        }

        function applyFilters() {
            const category = document.getElementById('categoryFilter').value;
            const query = document.getElementById('searchInput').value.trim().toLowerCase();

            filteredDocuments = documents.filter(doc => {
                const matchCategory = !category || doc.category === category;
                const matchSearch = !query ||
                    doc.docId.toLowerCase().includes(query) ||
                    (doc.category && doc.category.toLowerCase().includes(query));
                return matchCategory && matchSearch;
            });

            renderDocList();
        }

        function renderDocList() {
            const list = document.getElementById('docList');

            // Group by category
            const groups = {};
            for (const doc of filteredDocuments) {
                if (!groups[doc.category]) groups[doc.category] = [];
                groups[doc.category].push(doc);
            }

            let html = '';
            for (const [category, docs] of Object.entries(groups)) {
                html += `
                    <div class="category-group">
                        <div class="category-name" onclick="toggleCategory('${category}')">
                            <span>${category}</span>
                            <span class="count">${docs.length}</span>
                        </div>
                        <div id="cat-${category}">
                            ${docs.map(doc => `
                                <div class="doc-item ${currentDoc && currentDoc.docId === doc.docId ? 'active' : ''}"
                                     onclick="selectDoc(event, '${doc.circle}', '${doc.docId}')">
                                    <span class="doc-id">
                                        <span class="status-dot ${doc.status || 'drafting'}"></span>
                                        ${doc.docId}
                                    </span>
                                    <span class="doc-meta">
                                        <span>${doc.outputs.length} output(s)</span>
                                    </span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            if (filteredDocuments.length === 0) {
                html = '<div style="padding:20px;color:var(--muted);font-size:13px;">No documents match the current filters.</div>';
            }

            list.innerHTML = html;
        }

        function toggleCategory(name) {
            const el = document.getElementById(`cat-${name}`);
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        async function selectDoc(event, circle, docId) {
            event.stopPropagation();

            // Update active state
            document.querySelectorAll('.doc-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Find the document
            currentDoc = documents.find(d => d.circle === circle && d.docId === docId);
            if (!currentDoc) return;

            document.getElementById('currentDoc').textContent = docId;

            // Render doc content
            renderDocContent(currentDoc);

            // Render media
            renderMedia(currentDoc);
        }

        function renderDocContent(doc) {
            const pane = document.getElementById('docPane');

            // Fetch the actual .md content
            fetch(`${API}/api/documents/${doc.circle}/${doc.docId}`)
                .then(r => r.json())
                .then(data => {
                    const content = data.content || 'Document content not available';
                    pane.innerHTML = `
                        <div class="doc-header">
                            <div>
                                <h2>${doc.docId}</h2>
                                <span class="doc-id-badge">${doc.category}</span>
                            </div>
                        </div>
                        <div class="doc-content">
                            ${renderMarkdown(content)}
                        </div>
                    `;
                    initCollapsibles();
                })
                .catch(() => {
                    pane.innerHTML = `
                        <div class="doc-header">
                            <div>
                                <h2>${doc.docId}</h2>
                                <span class="doc-id-badge">${doc.category}</span>
                            </div>
                        </div>
                        <div class="doc-content">
                            <p style="color:var(--muted)">Failed to load document content</p>
                        </div>
                    `;
                });
        }

        function renderMarkdown(content) {
            // Simple markdown rendering
            let html = content
                .replace(/^---[\s\S]*?---\n*/, '') // Remove frontmatter
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/`(.+?)`/g, '<code>$1</code>')
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
                .replace(/^\| (.+) \|$/gm, (m) => {
                    const cells = m.split('|').filter(c => c.trim());
                    return '<tr>' + cells.map(c => `<td>${c.trim()}</td>`).join('') + '</tr>';
                })
                .replace(/(<tr>.*<\/tr>)/s, '<table>$1</table>')
                .replace(/!\[(.+?)\]\((.+?)\)/g, '<img src="$2" alt="$1">')
                .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>')
                .replace(/^---$/gm, '<hr>')
                .replace(/\n\n+/g, '</p><p>')
                .replace(/^(?!<[hpuolbt]|<pre|<blockquote|<table|<hr)(.+)$/gm, '<p>$1</p>')
                .replace(/<p><\/p>/g, '');

            return html;
        }

        function initCollapsibles() {
            document.querySelectorAll('.collapsible-header').forEach(h => {
                h.onclick = () => {
                    h.classList.toggle('collapsed');
                    const content = h.nextElementSibling;
                    if (content) content.classList.toggle('collapsed');
                };
            });
        }

        function renderMedia(doc) {
            const pane = document.getElementById('mediaPane');

            if (!doc.outputs || doc.outputs.length === 0) {
                pane.innerHTML = `
                    <div class="media-empty">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                        <span>No outputs for this document</span>
                    </div>
                `;
                return;
            }

            // Group outputs by circle
            const byCircle = {};
            for (const out of doc.outputs) {
                if (!byCircle[out.circle]) byCircle[out.circle] = [];
                byCircle[out.circle].push(out);
            }

            let html = '';
            for (const [circle, outputs] of Object.entries(byCircle)) {
                html += `
                    <div class="output-group">
                        <div class="output-group-title">${circle} <span>— ${outputs.length} file(s)</span></div>
                        <div class="media-grid">
                            ${outputs.map(out => {
                                const key = `${out.circle}|${out.provider}|${out.filename}`;
                                const selected = selectedOutputs.has(key);
                                const isImg = /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(out.filename);
                                const isVid = /\.(mp4|webm|mov|avi)$/i.test(out.filename);
                                const isAud = /\.(mp3|wav|ogg|m4a|aac)$/i.test(out.filename);
                                const src = `${API}/api/files/${out.circle}/${out.provider}/${out.filename}`;

                                return `
                                    <div class="media-card ${selected ? 'selected' : ''}"
                                         onclick="toggleSelection('${out.circle}', '${out.provider}', '${out.filename.replace(/\\/g, '\\\\')}')"
                                         ondblclick="openPreview('${out.circle}', '${out.provider}', '${out.filename.replace(/\\/g, '\\\\')}')">
                                        <div class="selected-badge">✓</div>
                                        ${isImg ? `<img src="${src}" loading="lazy" alt="${out.filename}">` : ''}
                                        ${isVid ? `<video src="${src}" muted></video>` : ''}
                                        ${isAud ? `<div style="aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;background:var(--card);"><span style="font-size:32px;">🔊</span></div>` : ''}
                                        <div class="media-info">
                                            <span class="media-name" title="${out.filename}">${out.filename}</span>
                                            <span class="media-meta">${out.provider}</span>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }

            pane.innerHTML = html;
        }

        function toggleSelection(circle, provider, filename) {
            const key = `${circle}|${provider}|${filename}`;
            if (selectedOutputs.has(key)) {
                selectedOutputs.delete(key);
            } else {
                selectedOutputs.add(key);
            }
            updateSelectionUI();
        }

        function updateSelectionUI() {
            document.getElementById('selectedCount').textContent = selectedOutputs.size;
            const hasSelection = selectedOutputs.size > 0;
            document.getElementById('approveBtn').disabled = !hasSelection;
            document.getElementById('draftBtn').disabled = !hasSelection;

            // Update card selection states
            document.querySelectorAll('.media-card').forEach(card => {
                card.classList.remove('selected');
            });
            for (const key of selectedOutputs) {
                const [circle, provider, filename] = key.split('|');
                // Find matching card - simplified selector
                document.querySelectorAll('.media-card').forEach(card => {
                    const onclick = card.getAttribute('onclick') || '';
                    if (onclick.includes(circle) && onclick.includes(provider) && onclick.includes(filename)) {
                        card.classList.add('selected');
                    }
                });
            }
        }

        function openPreview(circle, provider, filename) {
            const isImg = /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(filename);
            const isVid = /\.(mp4|webm|mov|avi)$/i.test(filename);
            const isAud = /\.(mp3|wav|ogg|m4a|aac)$/i.test(filename);
            const src = `${API}/api/files/${circle}/${provider}/${filename}`;

            const content = document.getElementById('previewContent');
            if (isImg) {
                content.innerHTML = `<img src="${src}" alt="${filename}">`;
            } else if (isVid) {
                content.innerHTML = `<video src="${src}" controls autoplay style="max-width:95vw;max-height:85vh;"></video>`;
            } else if (isAud) {
                content.innerHTML = `
                    <div style="background:var(--card);padding:40px;border-radius:12px;text-align:center;">
                        <span style="font-size:64px;">🔊</span>
                        <p style="margin-top:16px;font-size:14px;color:var(--muted)">${filename}</p>
                        <audio src="${src}" controls style="margin-top:20px;"></audio>
                    </div>
                `;
            }

            document.getElementById('previewName').textContent = filename;
            pendingMedia = { circle, provider, filename };
            document.getElementById('previewModal').classList.add('active');
        }

        function closePreview() {
            document.getElementById('previewModal').classList.remove('active');
        }

        function selectCurrentMedia() {
            if (pendingMedia) {
                const key = `${pendingMedia.circle}|${pendingMedia.provider}|${pendingMedia.filename}`;
                if (!selectedOutputs.has(key)) {
                    selectedOutputs.add(key);
                    updateSelectionUI();
                }
                closePreview();
            }
        }

        function openReviewModal(mode) {
            if (selectedOutputs.size === 0) return;

            const first = Array.from(selectedOutputs)[0].split('|');
            const [circle, provider, filename] = first;
            const src = `${API}/api/files/${circle}/${provider}/${filename}`;

            document.getElementById('reviewMediaPreview').style.display = 'flex';
            document.getElementById('reviewMediaThumb').src = src;
            document.getElementById('reviewMediaName').textContent = filename;
            document.getElementById('reviewMediaProvider').textContent = `${circle} / ${provider}`;
            document.getElementById('reviewNote').value = '';

            if (mode === 'approved') {
                document.getElementById('reviewModalTitle').textContent = '✓ Approve Output';
                document.getElementById('reviewModalSubtitle').textContent = `${selectedOutputs.size} output(s) selected`;
                document.getElementById('reviewSubmitBtn').textContent = 'Confirm Approve';
                document.getElementById('reviewSubmitBtn').className = 'btn btn-approve';
            } else {
                document.getElementById('reviewModalTitle').textContent = '↩ Set to Drafting';
                document.getElementById('reviewModalSubtitle').textContent = `${selectedOutputs.size} output(s) selected`;
                document.getElementById('reviewSubmitBtn').textContent = 'Confirm';
                document.getElementById('reviewSubmitBtn').className = 'btn btn-draft';
            }

            document.getElementById('reviewModal').classList.add('active');
            document.getElementById('reviewModal').dataset.mode = mode;
        }

        function closeReviewModal() {
            document.getElementById('reviewModal').classList.remove('active');
        }

        async function submitReview() {
            const mode = document.getElementById('reviewModal').dataset.mode;
            const note = document.getElementById('reviewNote').value.trim();
            const results = [];

            for (const key of selectedOutputs) {
                const [circle, provider, filename] = key.split('|');
                // Extract docId from filename (e.g. "hero_01.png" -> "hero")
                const docId = filename.replace(/(_\d+)+(\.[^.]+)$/, '');

                try {
                    const res = await fetch(`${API}/api/approve/${circle}/${docId}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            outputFile: filename,
                            note: note || undefined
                        })
                    });
                    const json = await res.json();
                    results.push({ success: json.success, filename });
                } catch (e) {
                    results.push({ success: false, filename, error: e.message });
                }
            }

            const allSuccess = results.every(r => r.success);
            if (allSuccess) {
                showToast(`${results.length} output(s) updated to ${mode}`, 'success');
                selectedOutputs.clear();
                updateSelectionUI();
                closeReviewModal();
                setTimeout(() => location.reload(), 800);
            } else {
                const failures = results.filter(r => !r.success).length;
                showToast(`${failures} failed`, 'error');
            }
        }

        function showToast(msg, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closePreview();
                closeReviewModal();
            }
        });

        init();
    </script>
</body>
</html>
