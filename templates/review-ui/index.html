<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OpsV Review</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #141418;
            --card: #1e1e24;
            --accent: #6366f1;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --blue: #3b82f6;
            --purple: #a855f7;
            --orange: #f97316;
            --text: #f1f5f9;
            --muted: #64748b;
            --border: rgba(255,255,255,0.06);
            --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 15px;
            line-height: 1.6;
        }

        /* Top Bar */
        .topbar {
            background: var(--surface);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            position: relative;
            z-index: 100;
        }
        .topbar .back-btn {
            background: none; border: none; color: var(--text); font-size: 20px; padding: 4px;
            display: none; cursor: pointer;
        }
        .topbar .doc-select {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .topbar .status-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--card);
            color: var(--muted);
            white-space: nowrap;
        }

        /* Relay Status Bar */
        .relay-bar {
            background: var(--surface);
            padding: 6px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            font-size: 12px;
            gap: 8px;
        }
        .relay-bar .relay-info { color: var(--muted); }
        .relay-bar .relay-mode { font-weight: 600; }
        .relay-bar .relay-mode.tunnel { color: var(--green); }
        .relay-bar .relay-mode.relay { color: var(--accent); }
        .relay-bar .relay-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
        }
        .relay-bar .relay-quota {
            flex: 1;
            height: 4px;
            background: var(--card);
            border-radius: 2px;
            overflow: hidden;
            margin: 0 8px;
        }
        .relay-bar .relay-quota-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.3s;
        }

        /* Main Content */
        .main {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 120px;
        }
        .main::-webkit-scrollbar { display: none; }

        /* Frontmatter Card */
        .fm-card {
            background: var(--card);
            margin: 12px 16px;
            padding: 14px 16px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        .fm-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }
        .fm-tag {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .fm-tag.scene { background: rgba(59,130,246,0.15); color: var(--blue); }
        .fm-tag.character { background: rgba(34,197,94,0.15); color: var(--green); }
        .fm-tag.prop { background: rgba(249,115,22,0.15); color: var(--orange); }
        .fm-tag.shot { background: rgba(168,85,247,0.15); color: var(--purple); }
        .fm-tag.status-draft { background: rgba(100,116,139,0.15); color: var(--muted); }
        .fm-tag.status-sync { background: rgba(234,179,8,0.15); color: var(--yellow); }
        .fm-tag.status-approve { background: rgba(34,197,94,0.15); color: var(--green); }
        .fm-title {
            font-size: 18px;
            font-weight: 700;
            margin-top: 6px;
        }
        .fm-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
            font-size: 12px;
            color: var(--muted);
        }
        .fm-meta span {
            background: rgba(255,255,255,0.04);
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* Markdown Content */
        .md-content {
            padding: 0 16px 20px;
            font-size: 15px;
            line-height: 1.65;
        }
        .md-content h1 { font-size: 20px; margin: 24px 0 12px; color: var(--text); }
        .md-content h2 { font-size: 17px; margin: 20px 0 10px; color: var(--text); scroll-margin-top: 60px; }
        .md-content h3 { font-size: 15px; margin: 16px 0 8px; color: var(--text); }
        .md-content p { margin-bottom: 10px; color: #94a3b8; }
        .md-content strong { color: var(--text); }
        .md-content pre {
            background: var(--card);
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            overflow-x: auto;
            margin: 10px 0;
            -webkit-overflow-scrolling: touch;
        }
        .md-content code {
            background: var(--card);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            color: #a5b4fc;
        }
        .md-content pre code { background: none; padding: 0; }
        .md-content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 12px;
            color: var(--muted);
            font-style: italic;
            margin: 10px 0;
        }
        .md-content ul, .md-content ol { margin: 8px 0 10px 20px; color: #94a3b8; }
        .md-content li { margin-bottom: 4px; }
        .md-content img { max-width: 100%; border-radius: 8px; margin: 10px 0; }
        .md-content table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
        .md-content th, .md-content td { padding: 8px; border: 1px solid var(--border); }
        .md-content th { background: var(--card); }
        .md-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

        /* Assets Section */
        .assets-section {
            padding: 0 16px 20px;
        }
        .assets-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 12px;
        }
        .asset-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .asset-card {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer;
            position: relative;
        }
        .asset-card.selected { border-color: var(--green); }
        .asset-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
            background: #000;
        }
        .asset-card video {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
        }
        .asset-card .asset-name {
            padding: 8px 10px;
            font-size: 11px;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .asset-card .asset-overlay {
            position: absolute;
            top: 6px; right: 6px;
            background: var(--green);
            color: #000;
            width: 22px; height: 22px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        .asset-card.selected .asset-overlay { display: flex; }

        /* Bottom Action Bar */
        .action-bar {
            position: fixed;
            bottom: 0;
            left: 0; right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 10px 16px 24px;
            display: flex;
            gap: 8px;
            z-index: 200;
        }
        .action-bar .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
        }
        .action-bar .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .action-bar .btn-revise { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .action-bar .btn-approve { background: var(--green); color: #000; }
        .action-bar .btn-feedback { background: var(--yellow); color: #000; }

        /* Anchor Panel */
        .anchor-panel {
            position: fixed;
            bottom: 0;
            left: 0; right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            border-radius: 16px 16px 0 0;
            transform: translateY(calc(100% - 44px));
            transition: transform 0.25s ease;
            z-index: 150;
            max-height: 60vh;
            display: flex;
            flex-direction: column;
        }
        .anchor-panel.expanded { transform: translateY(0); }
        .anchor-panel-header {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        .anchor-panel-header span {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
        }
        .anchor-panel-header .chevron {
            transition: transform 0.2s;
            font-size: 12px;
        }
        .anchor-panel.expanded .chevron { transform: rotate(180deg); }
        .anchor-list {
            overflow-y: auto;
            padding: 0 16px 16px;
            -webkit-overflow-scrolling: touch;
        }
        .anchor-list::-webkit-scrollbar { display: none; }
        .anchor-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            color: var(--muted);
            cursor: pointer;
        }
        .anchor-item:active { color: var(--text); }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            width: 100%;
            max-width: 360px;
            border: 1px solid var(--border);
        }
        .modal-box h2 { font-size: 16px; margin-bottom: 4px; }
        .modal-box .subtitle { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
        .modal-box textarea {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 10px 12px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            outline: none;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .modal-actions .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .modal-actions .btn-cancel { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .modal-actions .btn-confirm { background: var(--green); color: #000; }

        /* Image Preview */
        .img-preview {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .img-preview.active { display: flex; }
        .img-preview img { max-width: 95%; max-height: 85vh; object-fit: contain; }
        .img-preview .close-btn {
            position: absolute;
            top: 16px; right: 16px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            width: 40px; height: 40px;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--card);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 2000;
            opacity: 0;
            transition: all 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--red); }

        /* Empty State */
        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="topbar">
        <button class="back-btn" id="backBtn" onclick="showDocList()">←</button>
        <select class="doc-select" id="docSelect" onchange="onDocSelect(this.value)">
            <option value="">选择文档...</option>
        </select>
        <span class="status-badge" id="statusBadge">—</span>
    </div>

    <!-- Relay Status -->
    <div class="relay-bar" id="relayBar" style="display:none;">
        <span class="relay-info">模式:</span>
        <span class="relay-mode tunnel" id="relayMode">直连</span>
        <div class="relay-quota" id="relayQuotaBar" style="display:none;">
            <div class="relay-quota-fill" id="relayQuotaFill" style="width:0%"></div>
        </div>
        <button class="relay-btn" id="relayBtn" style="display:none;" onclick="toggleRelay()">开启中转</button>
    </div>

    <!-- Main Content -->
    <div class="main" id="main">
        <div class="empty-state" id="emptyState">
            <p>加载中...</p>
        </div>
    </div>

    <!-- Anchor Panel -->
    <div class="anchor-panel" id="anchorPanel">
        <div class="anchor-panel-header" onclick="toggleAnchors()">
            <span>📑 目录</span>
            <span class="chevron">▲</span>
        </div>
        <div class="anchor-list" id="anchorList"></div>
    </div>

    <!-- Bottom Action Bar -->
    <div class="action-bar" id="actionBar">
        <button class="btn btn-revise" onclick="submitAction('revise')">修订</button>
        <button class="btn btn-approve" id="btnApprove" disabled onclick="submitAction('approve')">通过</button>
        <button class="btn btn-feedback" id="btnFeedback" disabled onclick="submitAction('feedback')">反馈</button>
    </div>

    <!-- Review Modal -->
    <div class="modal-overlay" id="reviewModal">
        <div class="modal-box">
            <h2 id="modalTitle">操作确认</h2>
            <p class="subtitle" id="modalSubtitle"></p>
            <textarea id="modalNote" placeholder="输入备注（可选）..."></textarea>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn btn-confirm" id="modalConfirm" onclick="confirmAction()">确认</button>
            </div>
        </div>
    </div>

    <!-- Image Preview -->
    <div class="img-preview" id="imgPreview" onclick="closePreview()">
        <button class="close-btn">✕</button>
        <img id="previewImg" src="" alt="">
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = '';
        let documents = [];
        let currentDoc = null;
        let selectedAssets = new Set();
        let pendingAction = null;
        let relayInfo = null;

        async function init() {
            try {
                const res = await fetch(`${API}/api/documents`);
                documents = await res.json();
                populateDocSelect();
                updateRelayBar();

                if (documents.length > 0) {
                    selectDoc(documents[0].circle, documents[0].docId);
                } else {
                    document.getElementById('emptyState').innerHTML = '<p>无可用文档</p>';
                }
            } catch (e) {
                showToast('加载失败: ' + e.message, 'error');
            }
        }

        function populateDocSelect() {
            const select = document.getElementById('docSelect');
            select.innerHTML = '<option value="">选择文档...</option>' +
                documents.map(d => `<option value="${d.circle}/${d.docId}">${d.docId} (${d.category})</option>`).join('');
        }

        function onDocSelect(value) {
            if (!value) return;
            const [circle, docId] = value.split('/');
            selectDoc(circle, docId);
        }

        async function selectDoc(circle, docId) {
            currentDoc = documents.find(d => d.circle === circle && d.docId === docId);
            if (!currentDoc) return;

            document.getElementById('docSelect').value = `${circle}/${docId}`;
            document.getElementById('statusBadge').textContent = currentDoc.status || 'draft';
            selectedAssets.clear();
            updateActionButtons();

            // Fetch full document content
            try {
                const res = await fetch(`${API}/api/documents/${circle}/${docId}`);
                const data = await res.json();
                renderDocument(data);
            } catch (e) {
                showToast('加载文档失败', 'error');
            }
        }

        function renderDocument(data) {
            const main = document.getElementById('main');
            const content = data.content || '';
            const frontmatter = parseFrontmatter(content);
            const body = stripFrontmatter(content);

            let html = '';

            // Frontmatter card
            if (frontmatter) {
                html += renderFrontmatterCard(frontmatter);
            }

            // Markdown body
            html += `<div class="md-content">${renderMarkdown(body)}</div>`;

            // Assets
            if (currentDoc.outputs && currentDoc.outputs.length > 0) {
                html += `<div class="assets-section">`;
                html += `<div class="assets-title">资产 (${currentDoc.outputs.length})</div>`;
                html += `<div class="asset-grid">`;
                for (const out of currentDoc.outputs) {
                    const key = out.path;
                    const selected = selectedAssets.has(key);
                    const isImg = /\.(jpg|jpeg|png|gif|webp)$/i.test(out.filename);
                    const src = `${API}/api/files/${out.path}`;
                    html += `
                        <div class="asset-card ${selected ? 'selected' : ''}" onclick="toggleAsset('${key.replace(/'/g, "\\'")}', '${src.replace(/'/g, "\\'")}', ${isImg})" data-key="${key}">
                            <div class="asset-overlay">✓</div>
                            ${isImg ? `<img src="${src}" loading="lazy" alt="${out.filename}">` : ''}
                            ${!isImg ? `<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--card);font-size:32px;">📄</div>` : ''}
                            <div class="asset-name">${out.filename}</div>
                        </div>
                    `;
                }
                html += `</div></div>`;
            }

            main.innerHTML = html;
            buildAnchors();
        }

        function parseFrontmatter(content) {
            const match = content.match(/^---\n([\s\S]*?)\n---/);
            if (!match) return null;
            const lines = match[1].split('\n');
            const fm = {};
            for (const line of lines) {
                const m = line.match(/^([\w_]+):\s*(.*)$/);
                if (m) fm[m[1]] = m[2].trim();
            }
            return fm;
        }

        function stripFrontmatter(content) {
            return content.replace(/^---[\s\S]*?---\n*/, '');
        }

        function renderFrontmatterCard(fm) {
            const category = fm.category || 'unknown';
            const status = fm.status || 'drafting';
            const tagClass = category.toLowerCase();
            const statusClass = status === 'approved' ? 'status-approve' : status === 'syncing' ? 'status-sync' : 'status-draft';

            let metaHtml = '';
            const metaFields = ['scene_location', 'time_period', 'age_group', 'role', 'prop_type', 'episode', 'scene_num', 'location', 'shot_type'];
            for (const f of metaFields) {
                if (fm[f]) metaHtml += `<span>${f}: ${fm[f]}</span>`;
            }

            return `
                <div class="fm-card">
                    <div class="fm-tags">
                        <span class="fm-tag ${tagClass}">${category}</span>
                        <span class="fm-tag ${statusClass}">${status}</span>
                    </div>
                    ${fm.title ? `<div class="fm-title">${fm.title}</div>` : ''}
                    <div class="fm-meta">${metaHtml}</div>
                </div>
            `;
        }

        function renderMarkdown(content) {
            return content
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/`(.+?)`/g, '<code>$1</code>')
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
                .replace(/!\[(.+?)\]\((.+?)\)/g, '<img src="$2" alt="$1" onclick="openPreview(\'$2\')">')
                .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>')
                .replace(/^---$/gm, '<hr>')
                .split('\n\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('')
                .replace(/<p>(<h\d|<pre|<blockquote|<table|<hr|<ul|<ol)/g, '$1')
                .replace(/(<\/h\d>|<\/pre>|<\/blockquote>|<\/table>|<\/ul>|<\/ol>)<\/p>/g, '$1')
                .replace(/<p><\/p>/g, '');
        }

        function buildAnchors() {
            const anchors = [];
            document.querySelectorAll('.md-content h2').forEach((h, i) => {
                const id = `section-${i}`;
                h.id = id;
                anchors.push({ id, text: h.textContent });
            });

            const list = document.getElementById('anchorList');
            if (anchors.length === 0) {
                list.innerHTML = '<div class="anchor-item" style="color:var(--muted);">无目录</div>';
            } else {
                list.innerHTML = anchors.map(a =>
                    `<div class="anchor-item" onclick="scrollToAnchor('${a.id}')">${a.text}</div>`
                ).join('');
            }
        }

        function scrollToAnchor(id) {
            const el = document.getElementById(id);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                toggleAnchors(false);
            }
        }

        function toggleAnchors(force) {
            const panel = document.getElementById('anchorPanel');
            if (typeof force === 'boolean') {
                panel.classList.toggle('expanded', force);
            } else {
                panel.classList.toggle('expanded');
            }
        }

        function toggleAsset(key, src, isImg) {
            if (isImg) {
                openPreview(src);
                return;
            }
            if (selectedAssets.has(key)) {
                selectedAssets.delete(key);
            } else {
                selectedAssets.add(key);
            }
            updateAssetUI();
            updateActionButtons();
        }

        function updateAssetUI() {
            document.querySelectorAll('.asset-card').forEach(card => {
                const key = card.dataset.key;
                card.classList.toggle('selected', selectedAssets.has(key));
            });
        }

        function updateActionButtons() {
            const hasSelection = selectedAssets.size > 0;
            document.getElementById('btnApprove').disabled = !hasSelection;
            document.getElementById('btnFeedback').disabled = !hasSelection;
        }

        function openPreview(src) {
            document.getElementById('previewImg').src = src;
            document.getElementById('imgPreview').classList.add('active');
        }

        function closePreview() {
            document.getElementById('imgPreview').classList.remove('active');
        }

        function submitAction(action) {
            if ((action === 'approve' || action === 'feedback') && selectedAssets.size === 0) return;
            pendingAction = action;

            const titles = { approve: '✓ 通过', feedback: '✎ 反馈', revise: '✏ 修订' };
            const subtitles = {
                approve: '确认通过选中的资产？',
                feedback: '对选中资产提供反馈',
                revise: '请求修订当前文档'
            };

            document.getElementById('modalTitle').textContent = titles[action];
            document.getElementById('modalSubtitle').textContent = subtitles[action];
            document.getElementById('modalNote').value = '';
            document.getElementById('reviewModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('reviewModal').classList.remove('active');
            pendingAction = null;
        }

        async function confirmAction() {
            if (!pendingAction || !currentDoc) return;
            const note = document.getElementById('modalNote').value.trim();
            const action = pendingAction;

            // Build output files list
            const outputFiles = [];
            const outputLookup = {};
            for (const doc of documents) {
                for (const out of doc.outputs) outputLookup[out.path] = out;
            }
            for (const key of selectedAssets) {
                const out = outputLookup[key];
                if (out) outputFiles.push(out.filename);
            }

            try {
                const res = await fetch(`${API}/api/approve/${currentDoc.circle}/${currentDoc.docId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: action === 'approve' ? 'approve' : action === 'feedback' ? 'design_feedback' : 'revise_prompt',
                        outputFiles: outputFiles.length > 0 ? outputFiles : undefined,
                        note: note || undefined
                    })
                });
                const json = await res.json();
                if (json.success) {
                    showToast('操作成功', 'success');
                    selectedAssets.clear();
                    updateAssetUI();
                    updateActionButtons();
                    closeModal();
                    setTimeout(() => location.reload(), 600);
                } else {
                    showToast('操作失败', 'error');
                }
            } catch (e) {
                showToast('提交失败: ' + e.message, 'error');
            }
        }

        // Relay status
        async function updateRelayBar() {
            try {
                const res = await fetch(`${API}/api/session-info`);
                relayInfo = await res.json();
                const data = relayInfo.data || relayInfo;

                const bar = document.getElementById('relayBar');
                const mode = document.getElementById('relayMode');
                const btn = document.getElementById('relayBtn');
                const quotaBar = document.getElementById('relayQuotaBar');
                const quotaFill = document.getElementById('relayQuotaFill');

                bar.style.display = 'flex';
                const isRelay = data.routeMode === 'relay';
                mode.textContent = isRelay ? '中转' : '直连';
                mode.className = 'relay-mode ' + (isRelay ? 'relay' : 'tunnel');

                if (isRelay && data.relayQuota) {
                    quotaBar.style.display = 'block';
                    const pct = Math.min(100, Math.round((data.relayQuota.usedBytes / data.relayQuota.limitBytes) * 100));
                    quotaFill.style.width = pct + '%';
                    btn.style.display = 'none';
                } else if (!isRelay && data.relayAvailable) {
                    quotaBar.style.display = 'none';
                    btn.style.display = 'block';
                    btn.textContent = '开启中转';
                } else {
                    btn.style.display = 'none';
                }
            } catch {
                // Ignore — relay bar is optional
            }
        }

        async function toggleRelay() {
            try {
                const res = await fetch(`${API}/api/enable-relay`, { method: 'POST' });
                const json = await res.json();
                if (json.data || json.success) {
                    showToast('中转已开启，请刷新页面', 'success');
                    await updateRelayBar();
                } else {
                    showToast('开启失败', 'error');
                }
            } catch (e) {
                showToast('开启失败: ' + e.message, 'error');
            }
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closePreview();
                closeModal();
            }
        });

        init();
    </script>
</body>
</html>
