# OpsV 0.6.2 多模态资产生态系统配置文件
# 该文件定义了资产生成流水线的供应商及能力。基于 `job.type` 实现精准动态路由。
# 详情参考：https://github.com/Uncle7/OpenSpec-Video

providers:
  # ==========================================
  # 硅基流动 (SiliconFlow)
  # ==========================================
  siliconflow:
    required_env: ["SILICONFLOW_API_KEY"]
    models:
      qwen-image:
        enable: true
        type: "image_generation"
        input: ["text"]
        output: "image"
        model: "Qwen/Qwen-Image"
        defaults:
          quality: "1024x1024"
          aspect_ratio: "1:1"

      qwen-image-edit-2509:
        enable: true
        type: "image_generation"
        input: ["text", "image"]
        output: "image"
        model: "Qwen/Qwen-Image-Edit-2509"
        defaults:
          quality: "original"
          aspect_ratio: "original"

      wan2.2-i2v:
        enable: false
        type: "video_generation"
        input: ["text", "image"]
        output: "video"
        model: "wan-ai/Wan2.1-T2V-14B"
        api_url: "https://api.siliconflow.cn/v1/video/submit"
        api_status_url: "https://api.siliconflow.cn/v1/video/status"
        defaults:
          size: "1280x720"
          fps: 24
          duration: 5

  # ==========================================
  # 火山引擎 (Volcengine Ark)
  # ==========================================
  seedance:
    required_env: ["VOLCENGINE_API_KEY"]
    models:
      seadream-5.0-lite:
        enable: true
        type: "image_generation"
        input: ["text"]
        output: "image"
        model: "doubao-seedream-5-0-260128"
        defaults:
          quality: "2K"
          aspect_ratio: "16:9"
          max_images: 1
          steps: 30
          cfg_scale: 7.5
          negative_prompt: "blurry, low quality, distorted, deformed, ugly, bad anatomy, text, watermark, signature"

      seedance-1.5-pro:
        enable: true
        type: "video_generation"
        input: ["text", "image"]
        output: "video"
        model: "doubao-seedance-1-5-pro"
        api_url: "https://ark.cn-beijing.volces.com/api/v3/video/submit"
        quality_map:
          "480p": "480p"
          "720p": "720p"
          "1080p": "1080p"
        defaults:
          quality: "720p"
          aspect_ratio: "16:9"
          duration: 5
          fps: 24
          sound: true
        max_reference_images: 9

      seedance-2.0-fast:
        enable: true
        type: "video_generation"
        input: ["text", "image"]
        output: "video"
        model: "doubao-video-v2-fast"
        api_url: "https://ark.cn-beijing.volces.com/api/v3/video/submit"
        defaults:
          quality: "720p"
          aspect_ratio: "16:9"
          duration: 5
          fps: 24
          sound: true
        max_reference_images: 10

  # ==========================================
  # MiniMax 稀宇科技
  # ==========================================
  minimax:
    required_env: ["MINIMAX_API_KEY"]
    models:
      minimax-image-01:
        enable: false
        type: "image_generation"
        input: ["text", "image"]
        output: "image"
        model: "image-01"
        api_url: "https://api.minimaxi.com/v1/image_generation"
        defaults:
          aspect_ratio: "16:9"

      minimax-video-01:
        enable: false
        type: "video_generation"
        input: ["text", "image"]
        output: "video"
        model: "MiniMax-Hailuo-2.3"
        api_url: "https://api.minimaxi.com/v1/video_generation"
        api_status_url: "https://api.minimaxi.com/v1/query/video_generation"
        defaults:
          resolution: "1080P"
          duration: 5
        max_reference_images: 1
