# OpsV 0.4 多模态视频引擎调度配置文件
# 该文件定义了目前支持的生成引擎的能力级与默认参数。
# 调度器 (Dispatcher) 在发出请求前将严格根据下表映射参数。
# gen_command 标注该模型由哪个 CLI 命令执行。

models:
  # ==========================================
  # 图像模型：火山引擎 SeaDream 5.0 Lite
  # CLI: opsv gen-image -m seadream-5.0-lite
  # ==========================================
  seadream-5.0-lite:
    provider: "seadream"
    # 实际模型/Endpoint ID (由火山方舟提供)
    model: "doubao-seedream-5-0-260128"
    # 关联的 CLI 命令
    gen_command: "gen-image"
    # 所需 API Key（CLI 查表校验）
    required_env: ["VOLCENGINE_API_KEY"]
    fallback_env: ["SEADREAM_API_KEY"]
    # 模型端点能力
    features: ["txt2img", "img2img", "negative_prompt", "seed_control", "aspect_ratio", "sequential_generation"]
    
    # [默认参数] - 所有的 API 行为都应在此体现，严格对齐官方文档
    defaults:
      # 默认分辨率质量 (2K, 3K, 4K)
      quality: "2K"
      # 默认画幅比例 (1:1, 16:9, 9:16, 3:4, 4:3)
      aspect_ratio: "1:1"
      # 默认组图数量 (1-12)
      max_images: 4
      # 采样步数 (1-50)
      steps: 30
      # 提示词引导系数 (1-20)
      cfg_scale: 7.5
      # 默认负面提示词
      negative_prompt: "blurry, low quality, distorted, deformed, ugly, bad anatomy, text, watermark, signature"
    
    # 物理限制
    max_size: { width: 2048, height: 2048 }
    max_batch: 12

  # ==========================================
  # 视频模型：SiliconFlow Wan 2.1
  # CLI: opsv gen-video -m wan2.2-i2v
  # ==========================================
  wan2.2-i2v:
    provider: "siliconflow"
    model: "wan-ai/Wan2.1-T2V-14B"
    api_url: "https://api.siliconflow.cn/v1/video/submit"
    api_status_url: "https://api.siliconflow.cn/v1/video/status"
    # 关联的 CLI 命令
    gen_command: "gen-video"
    # 所需 API Key
    required_env: ["SILICONFLOW_API_KEY"]
    
    defaults:
      # 默认视频分辨率
      size: "1280x720"
      # 帧率
      fps: 24
      # 时长 (秒)
      duration: 5
    
    # 灵活性支持
    supports_first_image: true
    supports_middle_image: false
    supports_last_image: false
    supports_reference_images: false

  # ==========================================
  # 视频模型：Seedance 1.5 Pro (火山引擎)
  # CLI: opsv gen-video -m seedance-1.5-pro
  # ==========================================
  seedance-1.5-pro:
    provider: "seedance"
    model: "doubao-seedance-1-5-pro"
    api_url: "https://ark.cn-beijing.volces.com/api/v3/video/submit"
    # 关联的 CLI 命令
    gen_command: "gen-video"
    # 所需 API Key
    required_env: ["VOLCENGINE_API_KEY"]
    fallback_env: ["SEEDANCE_API_KEY"]
    
    # 质量映射 (Seedance 官方支持 480p, 720p, 1080p)
    quality_map:
      "480p": "480p"
      "720p": "720p"
      "1080p": "1080p"
    # 默认值
    defaults:
      quality: "720p"
      aspect_ratio: "16:9" # 支持 16:9, 9:16, 1:1, 4:3, 3:4, 21:9
      duration: 5
      fps: 24
      sound: true
    
    # 能力边界
    supports_first_image: true
    supports_middle_image: false
    supports_last_image: true
    supports_reference_images: true

  # ==========================================
  # 视频模型：CogVideoX (示例)
  # ==========================================
