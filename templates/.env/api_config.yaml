# OpsV 0.6.4 多模态资产生态系统配置文件
# 设计原则：defaults 即 API 请求体的参数模板，字段名 = API 真实字段名。
# Provider 代码只注入 model/prompt/reference_images，其余参数全部从此处读取。
#
# 修改 api_url 可切换私有化部署或区域节点；
# 修改 defaults 可调整生成参数而无需重新编译代码。
#
# ============================================================================
# Alias 命名规范 (v0.6.4+)
# ============================================================================
# 每个模型必须配置至少一个纯字母数字的 alias（无点号、无连字符、无下划线）。
# 原因：OpsV CLI 的 resolveModel() 使用正则 /^[a-z0-9_-]+\.[a-z0-9_.-]+$/ 匹配
#       provider.model 格式，model key 中的特殊符号可能导致解析歧义。
#       纯字母数字 alias 可完全规避此问题。
#
# 推荐格式：
#   - 简写型：seedance2, wanimg, qwenimg
#   - provider前缀型：volcseedance2, sfwanimg
#   - 禁止：含 . - _ 的 alias（如 volc.sd2, wan22-i2v）
#
# 使用示例：
#   opsv queue compile jobs.json --model seedance2
#   opsv queue run --model wanimg
# ============================================================================

providers:
  # ==========================================
  # 硅基流动 (SiliconFlow)
  # ==========================================
  siliconflow:
    required_env: ["SILICONFLOW_API_KEY"]
    models:
      # --- 图像: Qwen/Qwen-Image ---
      qwen-image:
        enable: true
        type: "image_generation"
        model: "Qwen/Qwen-Image"
        api_url: "https://api.siliconflow.cn/v1/images/generations"
        aliases: ["qwenimg", "sfqwenimg"]
        # 以下为 SiliconFlow Images Generations API 的完整参数模板
        # 文档: https://docs.siliconflow.cn/cn/api-reference/images/images-generations
        defaults:
          # Qwen-Image 推荐尺寸:
          # 1328x1328(1:1), 1664x928(16:9), 928x1664(9:16),
          # 1472x1140(4:3), 1140x1472(3:4), 1584x1056(3:2), 1056x1584(2:3)
          image_size: "1664x928"
          # CFG scale (0.1~20)，仅 Qwen-Image 有效。官方推荐 50 steps + CFG 4.0
          cfg_scale: 4.0
          # 推理步数 (1~100)
          steps: 50
          # 随机种子 (0~9999999999)
          seed: 42
          # 输出图片数量，仅 Kwai-Kolors/Kolors 有效
          # n: 1

      # --- 图像: Qwen/Qwen-Image-Edit-2509 ---
      # Edit 模型不支持 image_size 字段，代码会自动跳过
      qwen-image-edit-2509:
        enable: true
        type: "image_generation"
        model: "Qwen/Qwen-Image-Edit-2509"
        api_url: "https://api.siliconflow.cn/v1/images/generations"
        aliases: ["qwenedit", "sfqwenedit"]
        defaults:
          seed: 42
          # 必填: image (编辑目标图)
          # 可选: mask_image (蒙版图)

      # --- 视频: Wan-AI/Wan2.2-T2V-A14B (文生视频) ---
      wan2.2-t2v:
        enable: true
        type: "video_generation"
        model: "Wan-AI/Wan2.2-T2V-A14B"
        api_url: "https://api.siliconflow.cn/v1/video/submit"
        api_status_url: "https://api.siliconflow.cn/v1/video/status"
        aliases: ["want2v", "sfwant2v"]
        # 以下为 SiliconFlow Video Submit API 的完整参数模板
        # 文档: https://docs.siliconflow.cn/cn/api-reference/videos/videos_submit
        defaults:
          # 可用: "1280x720", "720x1280", "960x960"
          image_size: "1280x720"
          seed: 42

      # --- 视频: Wan-AI/Wan2.2-I2V-A14B (图生视频) ---
      # 必填: image 字段（首帧参考图），由 Provider 自动注入
      wan2.2-i2v:
        enable: true
        type: "video_generation"
        model: "Wan-AI/Wan2.2-I2V-A14B"
        api_url: "https://api.siliconflow.cn/v1/video/submit"
        api_status_url: "https://api.siliconflow.cn/v1/video/status"
        aliases: ["wani2v", "sfwani2v"]
        defaults:
          image_size: "1280x720"
          seed: 42

  # ==========================================
  # 火山引擎 (Volcengine Ark)
  # ==========================================
  volcengine:
    required_env: ["VOLCENGINE_API_KEY"]
    models:
      # --- 图像: Seedream 5.0 lite ---
      seadream-5.0-lite:
        enable: true
        type: "image_generation"
        model: "doubao-seedream-5-0-260128"
        api_url: "https://ark.cn-beijing.volces.com/api/v3/images/generations"
        aliases: ["seedream", "volcseedream"]
        # 以下为 Volcengine Images Generations API 的完整参数模板
        # 文档: https://www.volcengine.com/docs/82379/1824121
        defaults:
          # 图像输出尺寸 (两种方式不可混用):
          # 方式1 - 分辨率别名(模型根据prompt自动判断像素): "2K", "3K"
          # 方式2 - 指定宽高像素值(宽高比[1/16,16], 总像素[3686400,10404496]):
          #   2K: 1:1→2048x2048  16:9→2848x1600  9:16→1600x2848
          #       3:4→1728x2304  4:3→2304x1728  3:2→2496x1664  2:3→1664x2496  21:9→3136x1344
          #   3K: 1:1→3072x3072  16:9→4096x2304  9:16→2304x4096
          #       3:4→2592x3456  4:3→3456x2592  3:2→3744x2496  2:3→2496x3744  21:9→4704x2016
          size: "2048x2048"
          # 推理步数
          steps: 30
          # CFG (7.5 为常用值)
          cfg_scale: 7.5
          # 负面提示词
          negative_prompt: "blurry, low quality, distorted, deformed, ugly, bad anatomy, text, watermark, signature"
          # 输出格式
          output_format: "png"
          # 响应格式
          response_format: "url"
          # 水印
          watermark: false
          # 流式输出
          stream: false
          # 参考图由 Provider 自动注入为 image 字段（单图/多图）

      # --- 视频: Seedance 1.5 Pro (旧版 API) ---
      # ⚠️ 当前 Provider 使用旧版 /api/v3/video/submit，请求体仅支持 {model, prompt, image_url}
      #    以下 defaults 字段中，代码实际只读取并注入 image_url（单张参考图）
      seedance-1.5-pro:
        enable: true
        type: "video_generation"
        model: "doubao-seedance-1-5-pro"
        api_url: "https://ark.cn-beijing.volces.com/api/v3/video/submit"
        api_status_url: "https://ark.cn-beijing.volces.com/api/v3/video/status"
        aliases: ["seedance15p", "volcseedance15p"]
        defaults: {}
        max_reference_images: 1

      # --- 视频: Seedance 2.0 (新版 Content Generation API) ---
      # 使用全新 API (/api/v3/content_generation/tasks)，支持多模态输入。
      # 文档: https://www.volcengine.com/docs/82379/2291680
      seedance-2.0:
        enable: true
        type: "video_generation"
        model: "doubao-seedance-2-0-260128"
        api_url: "https://ark.cn-beijing.volces.com/api/v3/content_generation/tasks"
        api_status_url: "https://ark.cn-beijing.volces.com/api/v3/content_generation/tasks"
        aliases: ["seedance2", "volcseedance2"]
        defaults:
          # 视频宽高比: "16:9", "9:16", "1:1"
          ratio: "16:9"
          # 视频时长(秒): 5, 8, 10
          duration: 5
          # 是否生成音频
          generate_audio: true
          watermark: false
        max_reference_images: 9
        # content[] 多模态输入: text(1) + image(0~9) + video(0~3) + audio(0~3)
        # image role: reference_image(普通参考) / first_frame(首帧) / last_frame(尾帧)
        # video role: reference_video
        # audio role: reference_audio
        # 不支持 "文本+音频"、"纯音频" 输入组合
        # 可用 asset://<ID> 引用预置虚拟人像或已授权真人素材

      # --- 视频: Seedance 2.0 Fast (新版 Content Generation API) ---
      seedance-2.0-fast:
        enable: true
        type: "video_generation"
        model: "doubao-seedance-2-0-fast-260128"
        api_url: "https://ark.cn-beijing.volces.com/api/v3/content_generation/tasks"
        api_status_url: "https://ark.cn-beijing.volces.com/api/v3/content_generation/tasks"
        aliases: ["seedance2f", "volcseedance2f"]
        defaults:
          ratio: "16:9"
          duration: 5
          generate_audio: true
          watermark: false
        max_reference_images: 9

  # ==========================================
  # MiniMax 稀宇科技
  # ==========================================
  minimax:
    required_env: ["MINIMAX_API_KEY"]
    models:
      # --- 图像: image-01 ---
      minimax-image-01:
        enable: false
        type: "image_generation"
        model: "image-01"
        api_url: "https://api.minimaxi.com/v1/image_generation"
        aliases: ["minimaximg"]
        defaults:
          aspect_ratio: "16:9"
          response_format: "base64"
          # negative_prompt 会被 Provider 拼接进 prompt 文本
          # subject_reference 由 Provider 自动注入（单图角色参考）

      # --- 视频: MiniMax-Hailuo-2.3 ---
      minimax-video-01:
        enable: false
        type: "video_generation"
        model: "MiniMax-Hailuo-2.3"
        api_url: "https://api.minimaxi.com/v1/video_generation"
        api_status_url: "https://api.minimaxi.com/v1/query/video_generation"
        aliases: ["minimaxvid"]
        defaults:
          resolution: "1080P"
          duration: 5
        max_reference_images: 1
