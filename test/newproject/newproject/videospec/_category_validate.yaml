# ============================================================================
# 漫剧制作 Category 验证规则 (Comic Production v1.0)
# ============================================================================
# 项目级覆盖 ~/.opsv/category_validate.yaml
# 每个 category 可定义 required_fields、field_schema、verify 命令
# verify 命令为 Agent 提供可循环迭代的检查工具
# ============================================================================

# ---------------------------------------------------------------------------
# 内置 category（保留）
# ---------------------------------------------------------------------------

project:
  required_fields: [status]
  skip_prompt_check: true

shotlist:
  required_fields: [status, title]
  field_schema:
    prompt:
      min_length: 10
      no_placeholder: true

# ============================================================================
# 漫剧专用 Category
# ============================================================================

# --- 漫剧项目元数据 ---
comic_project:
  required_fields: [status, title, genre, aspect_ratio, resolution, total_episodes]
  skip_prompt_check: true
  field_schema:
    title:
      min_length: 4
      no_placeholder: true
    vision:
      min_length: 20
  verify:
    - command: "opsv validate"
      description: "校验项目文档完整性"
    - command: "opsv circle refresh"
      description: "刷新依赖图状态"

# --- 角色资产定档 ---
# 核心：角色视觉 + 声线描述 + 多角度参考
comic_character:
  required_fields: [status, title, visual_brief, visual_detailed, prompt]
  field_schema:
    visual_brief:
      min_length: 10
      max_length: 120
      no_placeholder: true
    visual_detailed:
      min_length: 30
      no_placeholder: true
    prompt:
      min_length: 20
      no_placeholder: true
      refs_in_prompt_must_match_refs: true
    negative_prompt:
      min_length: 5
    voice_profile:
      min_length: 10
      description: |
        声线描述 — 用于 TTS 配音生成。
        包含：性别、年龄段、音色特征（清亮/低沉/沙哑）、语速、情感基调。
        示例："青年男声，低沉有磁性，语速中等偏慢，威严沉稳"
  verify:
    - command: "opsv validate"
      description: "校验文档字段完整性"
    - command: "opsv refs check {{file}}"
      description: "检查 prompt ↔ refs 双向一致性"

# --- 场景/环境定档 ---
comic_scene:
  required_fields: [status, title, prompt]
  field_schema:
    prompt:
      min_length: 10
      no_placeholder: true
      refs_in_prompt_must_match_refs: true
    visual_detailed:
      min_length: 20
    time_of_day:
      description: "时间/光照条件：dawn/day/dusk/night/interior"
    mood:
      description: "场景情绪基调：庄严/阴森/温馨/紧张"
  verify:
    - command: "opsv validate"
      description: "校验文档完整性"
    - command: "opsv refs check {{file}}"
      description: "检查 refs 不依赖角色——场景定档仅依赖风格参考"

# --- 分镜脚本 ---
# 文学剧本 → 可视化分镜，含运镜指令和运动描述
comic_storyboard:
  required_fields: [status, title, prompt, refs, duration, episode, scene_number]
  field_schema:
    prompt:
      min_length: 20
      no_placeholder: true
      refs_in_prompt_must_match_refs: true
    visual_detailed:
      min_length: 20
    duration:
      description: "镜头时长，如 '5s'、'8s'、'10s'"
    episode:
      description: "所属集数，如 'EP01'"
    scene_number:
      description: "场次编号，如 '1-1'"
    camera_motion:
      min_length: 5
      description: |
        运镜指令（英文）：Dolly in / Pan right / Crane up / Static / Drone track / Dutch angle
        示例："Slow dolly in, starting wide establishing shot → medium close-up on character face"
    motion_prompt:
      min_length: 10
      description: |
        运动提示词（英文）— 仅描述"怎么动"，不描述"长什么样"。
        遵循分离主义：参考图决定外观，motion_prompt 只写动作。
        示例："The character slowly turns to face the camera, robes flowing in wind. Micro-expressions: eyes narrowing, slight frown."
    first_frame:
      description: "首帧参考路径，支持 @FRAME:prev_shot_last 或 @shot_id:first"
    last_frame:
      description: "尾帧参考路径"
    frame_count:
      description: "参考帧数量：1/2/4，默认 4（4 帧参考驱动视频生成）"
    audio_ref:
      description: "配音/音效引用 @voice_id"
  verify:
    - command: "opsv validate"
      description: "校验分镜文档"
    - command: "opsv refs check {{file}}"
      description: "检查 prompt 中的 @ 引用全部在 refs 中声明"
    - command: "opsv circle refresh"
      description: "确认当前 Circle 依赖状态"

# --- 动态镜头（视频生成） ---
# 基于 comic_storyboard 的首/尾帧 + 4 帧参考图 → 视频
comic_shot:
  required_fields: [status, title, prompt, duration]
  field_schema:
    prompt:
      min_length: 20
      no_placeholder: true
    duration:
      description: "视频时长 '5s' / '8s' / '10s'"
    first_frame:
      description: "首帧图片路径（必填，首尾帧模式下）"
    last_frame:
      description: "尾帧图片路径（可选）"
    model:
      description: "视频模型：volc.seedance2/volc.seedance2f/siliconflow.wani2v"
    ratio:
      description: "宽高比：16:9 / 9:16 / 1:1"
    generate_audio:
      description: "是否连带生成音频：true/false"
  verify:
    - command: "opsv validate"
      description: "校验镜头文档"
    - command: "opsv animate --model {{model}} --dry-run"
      description: "预览视频编译结果"

# --- 配音/语音资产 ---
comic_voice:
  required_fields: [status, title, character_ref, script_text, voice_profile]
  field_schema:
    character_ref:
      description: "绑定的角色 @id，如 '@yun_li_adult'"
    script_text:
      min_length: 2
      description: "配音台词全文"
    voice_profile:
      min_length: 10
      description: "声线参数：性别/年龄/音色/语速/情感"
    emotion:
      description: "情感标签：neutral/angry/sad/happy/fearful/whisper"
    duration_estimate:
      description: "预估时长 '3s'"
    model:
      description: "TTS 模型：siliconflow.cosyvoice2 / volc.seedance2(audio)"
  verify:
    - command: "opsv validate"
      description: "校验配音文档"
    - command: "opsv audio --model {{model}} --dry-run"
      description: "预览音频编译（规划中）"

# --- 音效资产 ---
comic_sfx:
  required_fields: [status, title, sfx_type, duration]
  field_schema:
    sfx_type:
      description: "音效类型：ambient/foley/impact/magic/weapon/nature/ui"
    prompt:
      min_length: 5
      description: "音效描述提示词"
    duration:
      description: "时长 '2s'"
  verify:
    - command: "opsv validate"
      description: "校验音效文档"

# --- 单集成片 ---
comic_episode:
  required_fields: [status, title, episode_number, total_shots]
  skip_prompt_check: true
  field_schema:
    episode_number:
      description: "集数编号 'EP01'"
    total_shots:
      description: "本集总镜头数"
    duration_total:
      description: "本集总时长（含片头片尾）"
  verify:
    - command: "opsv circle refresh"
      description: "确认所有依赖资产 approved"
    - command: "opsv validate"
      description: "校验整集文档"
